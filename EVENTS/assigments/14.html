<html>

<head> 
  <style>
    .ff{
        border:2px solid;
        width: 285px;
        height: 180px;
        
    }
  </style>

</head>

<body>
         
    
    <table align="center">
        <tr>
            <td>
                <h1>Show images using url</h1>
            </td>
        </tr>
        <tr> 
            <td>

                  <label for="01">Enter Image url :</label>
                 <input type="url"  id="01"/>
            </td>
        </tr>
        <tr>
            <td>
                 <button onclick="abc()">Add Image </button>
            </td>
        </tr>
    </table>
 
    
              

   
<script>
         function abc()
         {
             var f = document.getElementById("01")
              

             var image = document.createElement("img")
             image.src = f.value
             
             console.dir(image)
            

             image.className ="ff"
          
             document.body.appendChild(image)
        
         }
</script>
</body>
</html>
