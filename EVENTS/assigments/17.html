<html>
    <head> 
        
        <style>
            .d1,img
            {
                 border:2px solid ;
                 width: 404px;
                 height :250px;
                 margin: auto;
            }
            button
            {
                margin: auto;
            }
        </style>
       
    </head>

    <body> 
             
        <div class="d1">

           <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQn2nmWoa-66Yo5xylQwIiAxtvMrK2pB2l4CA&s" id="d2" />

        </div>
        <br>

        <button  onclick="a()" style="margin-left: 558px;"> PREV</button> 

        <button   onclick="abc()" style="margin-left: 144px;"> Next</button>
     

         <script> 

            var images = ["https://thumbs.dreamstime.com/b/tiger-wild-winter-nature-amur-tiger-running-snow-action-wildlife-scene-danger-animal-cold-winter-tajga-russ-84783074.jpg",
            "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRN_XXSyurR9URFgpCWIxupleNhqa9AtkkaJw&s",
            "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ9wl5xfVuzRmBNbqj8mKwsqAKwptQPO3LE7Q&s"]

          var next = document.getElementById("d2")
          var i = 0 

          

            function abc()
            {
               next.src = images[i] 
               i =  i+1
               if( i > images.length)
               { 
                i = 0 
                next.src = "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQn2nmWoa-66Yo5xylQwIiAxtvMrK2pB2l4CA&s"
               }
            }
           
          
             function a()
             {
                i = i-1
                next.src = images[i] 

                if( i <  0)
             {
                   i = 0 
                next.src = "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQn2nmWoa-66Yo5xylQwIiAxtvMrK2pB2l4CA&s"
             }

             }
            
                
        

         
         

         </script>

    </body>
</html>
