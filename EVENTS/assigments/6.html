<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        button
        {
            width:50px;
            height:70px
        }
    </style>
</head>
<body>
    

    <button onclick="ab(event)"> ON</button>


    <script>
        function ab(a)
        { 
             if(a.target.innerHTML === "ON")
             {
                a.target.innerHTML = 'OFF'
             }
             else
             {
                a.target.innerHTML = "ON"
             }
     
        }
    </script>
</body>
</html>
