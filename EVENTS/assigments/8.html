<!DOCTYPE html>
<html>
<head>
    <title>Like Dislike</title>
</head>
<body>

    <h1>Like and Dislike Button</h1>

    <button onclick="likeCount()">Like</button>
    <span id="like">0</span>

    <br><br>

    <button onclick="dislikeCount()">Dislike</button>
    <span id="dislike">0</span>

    <script>

        var like = 0;
        var dislike = 0;

        function likeCount()
        {
            like = like + 1;

            document.getElementById("like").innerHTML = like;
        }

        function dislikeCount()
        {
            dislike = dislike + 1;

            document.getElementById("dislike").innerHTML = dislike;
        }

    </script>

</body>
</html>
