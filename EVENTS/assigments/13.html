<html>
    <head> 

        <style>
            table
            {
              border: 2px solid;
              width: 150 px;
              
            }
            h1{
                
                display: inline;
                margin: auto;
            }

        </style>

    </head>
    
    <body>

        <table align="center"> 


            <tr>
                <td>
                    <h1 onclick="abc(1)">☆</h1>
                    <h1 onclick="abc(2)">☆</h1>
                    <h1 onclick="abc(3)">☆</h1>
                    <h1 onclick="abc(4)">☆</h1>
                    <h1 onclick="abc(5)">☆</h1>
                    <h1 onclick="abc(6)">☆</h1>
                </td>

            </tr>
              <tr>
                <td> 
                    <h2 id="d1"></h2>
                    
                </td>
              </tr>
        </table>
           

         <script>
            var x = document.querySelectorAll("h1")
            console.dir(x)
            console.log("x=",x)

          
            
           function abc(r)
           {
             x.forEach
             (
                function(a,b)
                {
                     console.log("r = " , r)
                     console.log(" b= ", b)
                     if(b <  r)
                     {
                        x[b].innerHTML = "⭐"
                     }
                     else
                     {
                        x[b].innerHTML = "☆"
                     }
                }
             )
                         

         document.getElementById("d1").innerHTML =
            "Rating : " + r +"/" + x.length ;
           
              
               
           }
             


         </script>

    </body>
</html>
