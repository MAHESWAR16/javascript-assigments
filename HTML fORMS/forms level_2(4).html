<html> 
    <head>
        <style>
            label,button

             margin-left: 35px

        <h3 style="margin:0;">Fill out the form to register to our event </h3> 
        <hr style="margin-top: 65px;">
   
        <form onsubmit="abc(event)"> 
           <table>
            <tr> 
                <td>

                     <input type="text" name="lastname" /><br>
                    <label style="margin-left: 102px;">Firstname</label> 
                    <label style="margin-left: 120px;">lastname</label>
                </td>
            </tr>


            <tr>

            </tr>

            <tr> 
                <td style="padding-top: 53px;">
                    <label>Company</label>
                    <input type="text" style="margin-left: 5px;"/>
                </td>
            </tr>

            <tr> 
                <td style="padding-top: 53px;"> 
                    <label>Email</label>
                    <input type="email" style="margin-left:32px;" placeholder="Enter Email id"
                </td>
            </tr> 

            <tr> 
                <td style="padding-top: 53px;">
                    <label> Phone Number </label>

                    <input type="number" style="margin-left: 0px;">

            </tr>
            <tr> 
                <td style="padding-top: 53px;">
                    <label>Are you an exexisitng customer </label>
                    <input type="radio" name="execisting customer" /> Yes 
                    <input type="radio" name="execisitng customer" /> No
                </td>
            </tr>
            <tr>
                <td style="padding-top: 53px;"> 
                    <button>Register</button>

                </td>
            </tr>

        </form> 


        <script>

                console.dir(e)
