<script>
    //Write a program to sort the array based on the number of occurrences of elements Ex: original array: [1,2,5,6,2,1,6,1,2,6,2,1,2]; After the logic: [5,6,6,6,1,1,1,1,2,2,2,2,2]; //5 occurred one time,6 three times,1 occurred 4 times, 2 occurred 5 times


    var array = [1,2,5,6,2,1,6,1,2,6,2,1,2]
  
    var unique = []

    var freq  = []

for(var i = 0 ; i<array.length ; i = i+1)
{
                 
    if(unique.indexOf(array[i]) === -1)
{
    unique.push(array[i])
}
 

}

console.log("unique",unique)  // [1,2,5,6]

var count 

for(var i = 0 ; i<unique.length ; i=i+1)
{
             count = 0 
    for(var m = 0 ; m<array.length ; m=m+1)
{

           if(unique[i] === array[m])

           {
                    count = count + 1



           }

}
 

freq.push(count )



}

console.log("unique" ,unique)//[1,2,5,6]
console.log("freq " ,freq)//[4,5,1,3]

var result = []

for(var c = 1 ; c<array.length ; c= c+1)
{

     for(var i = 0 ; i<freq.length ;  i = i+1)
     {

        if(freq[i] === c)

        {
                       
            for(var v  = 0 ; v<c ; v = v+1)
              {
                   result.push(unique[i])
               }
          
        }

    }

 }

console.log("result = " , result)
</script>
