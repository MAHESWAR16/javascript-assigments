<script>
    //For the Given array: [23,34,54,10,4,7] print all the even numbers in an Array. Expected output: 34,54,10,4

    var array = [23,54,10,4,7]


    var result = array.reduce(


           function(a,b)
           {
                
                if( b % 2 === 0)

                {

                    a.push(b)
                }
                

                return a 
             
           }
    ,[])

    console.log(result)
</script>
