<script>
    //Input week number and print weekday.

 

    function weeknumber(a)
    {
       
        
        if(a === 1)
         
        {
            return "weekday is monday"

        }
        else if( a === 2)
        {
            return "weekday is tuesday"
        }
        else if(a === 3)
        {
            return "weekday is wednesady"
        }
        else if(a === 4)
        {
            return " weekday is thursday"
        }
        else if(a === 5)
        {
            return " weekday is friday"
        }
        else if(a === 6)
        {
            return " weekday is saturday"
        }
        else
        {
            return "weekday is sunday"
        }
      

    }

 
 
 


   var weekday =  weeknumber(+prompt(" enter a number from  1 to 7"))

   console.log('weekday' , weekday)
</script>
