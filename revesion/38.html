<script>
    //Write a program to print 1 to 10 odd numbers using a for loop 

            
    var odd  =  function (b)
                    {
                        
                        var array  =  [] 

                     while (b<= 10)
                     {
                         
                        if(b % 2 !== 0)
                     {
                        array.push(b)
                     }

                         b = b+1
                     }

                       return array 

                    }



       var result = odd(1)


       console.log("result = " , result)
</script>
