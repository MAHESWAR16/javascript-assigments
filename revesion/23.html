<script>
    //nput month number and print number of days in that month.
    

     var monthNumber = function(month)
                         {
                           if(month === 2)
                           {
                            return 28
                           }
                           else if(month === 4 || month === 6 || month === 9 || month === 11)
                           {
                            return 30
                           }
                           else if( month >=1 && month <= 12)
                           {
                            return 31
                           }
                           else
                           {
                            return " please enter a valid month"
                           }

                             
                         }
   
     console.log(monthNumber(5))
