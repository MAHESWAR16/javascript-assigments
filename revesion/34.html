<script>
 ///Write a program to print 1 to 10 numbers using a for loop


 var print = function(a)
               
             
  {

    var array = []

    for(var i =a  ; i<= 10 ; i=i+1)
     {
          array.push(i)
     }

     return array 

    }
 var result = print(1)

 console.log('result = ',result)
</script>
