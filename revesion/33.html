<script>


     //Write a program to print factors of 24

     var f =  function (a)
               {
                   
                var array = []
                while(a >=1)
               {
                   
                if(24 % a === 0)

                {
                array.push(a)
                } 
                
                 a = a-1
               }
                    
               return array

               }
               var result = f(24)

               console.log("result= " , result)
</script>
