<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 id="d1"> HELLO <i> Maheswar </i> WORLD </h1>

    <button onclick="abc()"> click here to change content</button>
 
  <!--
    Inside this <h1> we have:

Normal text → HELLO

HTML tag → <i>

Text inside <i> → Maheswar

Normal text → WORLD

innerText

👉 innerText gives only the visible text

If you write:

var x = document.getElementById("d1");
console.log(x.innerText);
✅ Output:
HELLO Maheswar WORLD

✔ No <i> tag
✔ Only text
✔ Exactly what you see on screen


innerHTML

👉 innerHTML gives text + HTML tags inside the element

If you write:

var x = document.getElementById("d1");
console.log(x.innerHTML);
✅ Output:
HELLO <i> Maheswar </i> WORLD

✔ Includes <i> tag
✔ Shows HTML structure

HELLO <i> Maheswar </i> WORLD
Property	What it returns
innerText	HELLO Maheswar WORLD
innerHTML	HELLO <i> Maheswar </i> WORLD


example: 

<h1 id="d1"> HELLO <i> Mahesh </i> WORLD </h1>

🔵 1️⃣ innerText (Only Visible Text)

var x = document.getElementById("d1")
console.log(x.innerText)
output 
HELLO Mahesh WORLD

2️⃣ innerHTML (Text + Tags)
console.log(x.innerHTML)
output:
HELLO <i> Mahesh </i> WORLD







-->


  
  
    <script>

       

      

 
            function abc()
            {
               
               var x =  document.getElementById("d1")


               x.innerText= "kick"

                  console.log(x)

         console.dir(x)


         console.log(x.innerText)
         console.log(x.innerHTML)

            }

    </script>

    
</body>
</html>
