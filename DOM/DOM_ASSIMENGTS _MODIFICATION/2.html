<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <button onclick="toogle()" id ="22"> Toogle </button>


    <script>
          
         
          

           var count = 0 

              var x = document.createElement("h1")

       function toogle()
       {
        
         
          if( count === 0)
          {
          
          x.innerHTML = "true"
          document.body.appendChild(x)
           count = count + 1
          }
          else
          {
            
          x.innerHTML = "false"
          document.body.appendChild(x)
          count = 0
                  
          }


          console.log(" count  = " , count)
         
       }

    </script>
</body>
</html>
