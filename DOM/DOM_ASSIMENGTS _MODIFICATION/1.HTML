<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .c
        {
            background-color: green;
        }

        .d
        {
            background-color: aliceblue;
        }

       
    </style>
</head>
<body>
     <button onclick="nac()" id="d1" > white</button>

     <script>
        var count = 0
        
        var x =  document.querySelector("#d1")
        
        function nac()
        { 
            if(count < 1)
        {
           

           x.innerHTML ="green" 
           x.className ="c"
              count = count + 1
           console.log(" count = " , count)
        }

        else
        {
            count = 0 
            x.innerHTML = "white"
            x.className = "d"
        }
          
        }
        

        
      
     </script>
</body>
