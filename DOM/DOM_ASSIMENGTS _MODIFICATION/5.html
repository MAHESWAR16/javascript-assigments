<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
          
    <img src="https://cdn-icons-png.flaticon.com/128/1828/1828665.png">

    <br>
   
    <!-- <img src="https://cdn-icons-png.flaticon.com/128/1828/1828640.png">
    -->
     
    
   

    <button onclick="abc()"> OFF</button>



</body>
<script>
          

          var count = 0 

          function abc()
          { 

            if(count === 0)
          {
               var e  = document.querySelector("button")
            
            e.innerText = 'ON'          
                 
            var h = document.querySelector("img")
            h.src = "https://cdn-icons-png.flaticon.com/128/1828/1828640.png"
                 

          
            count = count + 1
          } 

          else
          {
             var e  = document.querySelector("button")
            
            e.innerText = 'OFF'  

            var h = document.querySelector("img")
            h.src ="https://cdn-icons-png.flaticon.com/128/1828/1828665.png"
                 

            count = 0 
          }
           
          }



</script>
</html>
