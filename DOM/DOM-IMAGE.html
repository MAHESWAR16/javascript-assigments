<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    
  <div id = "d1">

  </div>


  <div id="d2">

  </div>


  <div id="d3">

  </div>


   <button onclick="prev()">previous</button>

   <button onclick="next()">next</button>
    <script>

       var god_images = [
        "https://plus.unsplash.com/premium_photo-1676179691830-5bd6c9749088?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTd8fGhpbmR1JTIwZ29kfGVufDB8fDB8fHww",

        "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTvmqYJHpKEKr11AXHdNsCw9UUOGs6ssvxCeA&s",

        "https://t3.ftcdn.net/jpg/07/50/70/12/360_F_750701219_y4IjNEskPzPhyb2QtQ7iDJv7kKqKZALF.jpg"
       ]

        
       god_images.forEach(
            function(e)
            {
              var image =  document.createElement("img")

              image.src= e

              console.log("image =" ,image)
              image.style.width = "250px"
              image.style.height="180px"

              document.getElementById("d1").appendChild(image)
            }

       )

       var i = 0

       var newimage =    document.createElement("img")

       newimage.src = god_images[i]

       newimage.style.height = "125px";

       document.getElementById("d2").appendChild(newimage)

       console.log(newimage) 
        
           console.log(" i" ,i)

      



       function next()
{
    i++

    if(i >= god_images.length)
    {
        i = 0
    }

    newimage.src = god_images[i]

    console.log("i =", i)
}
     
      
     
      
     
      


        function prev()
{
    i--

    console.log(" i" , i )

    if(i < 0)
    {
        i = god_images.length - 1
    }

    newimage.src = god_images[i]

    console.log("i =", i)
}
        
            
            
          
        
         


      

     
          
    
   

     
    </script>
</body>
</html>
